name: Bug Report
description: Something in the viewer doesn't work as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "e.g., Chrome 134 on macOS 15"
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (optional)
      description: Drag and drop an image here if applicable
