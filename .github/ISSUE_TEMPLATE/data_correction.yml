name: Data Correction
description: Report an incorrect or missing entry in the tango discography data
title: "[Data] "
labels: ["data-correction"]
body:
  - type: input
    id: artist
    attributes:
      label: Artist / Orchestra
      placeholder: "e.g., Carlos Di Sarli"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "e.g., Bahía Blanca"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      placeholder: "e.g., 1957 or 03/15/1957"

  - type: input
    id: current
    attributes:
      label: What does it say?
    validations:
      required: true

  - type: input
    id: corrected
    attributes:
      label: What should it say?
    validations:
      required: true
